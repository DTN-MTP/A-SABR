repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all -- --check
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        entry: |
                sh -c '
                cargo clippy --bins --tests --benches --all-features -- -D warning &&
                cargo clippy --lib -- -D warnings
                cargo clippy --example bundle_processing --features "node_proc" -- -D warnings
                cargo clippy --example contact_plans --example dijkstra_accuracy \
                             --example eto_management --example inter-regional_routing \
                             --example satellite_constellation --all-features -- -D warnings'
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-tests
        name: cargo tests
        entry: cargo test --release --all-features --tests
        language: system
        types: [rust]
        pass_filenames: false
