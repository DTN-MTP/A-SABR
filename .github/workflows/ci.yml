name: A-SABR CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:
    inputs:
      job:
        description: Job to run
        type: choice
        required: true
        default: benchmarks
        options:
          - lint
          - tests
          - benchmarks
          - coverage

concurrency:
  group: ci-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint and Style (Pre-commit)
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || inputs.job == 'lint'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: swatinem/rust-cache@v2
      - uses: pre-commit/action@v3.0.1

  tests:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: [lint]
    if: | # always() to allow manual job to run without its dependencies (don't skip it)
      always() && (
        (github.event_name == 'workflow_dispatch' && inputs.job == 'tests') ||
        (github.event_name != 'workflow_dispatch' && needs.lint.result == 'success')
      )
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
      - name: Run Tests
        run: cargo test --all-features --tests --lib --bins
      - name: Test Benches
        run: cargo test --all-features --benches

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: [tests]
    if: |
      always() && (
        (github.event_name == 'workflow_dispatch' && inputs.job == 'coverage') ||
        (github.event_name != 'workflow_dispatch' && github.ref == 'refs/heads/main' && needs.tests.result == 'success')
      )
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-tarpaulin
      - run: cargo tarpaulin --ignore-tests --out Html
      - uses: actions/upload-artifact@v4
        with:
          name: code-coverage-report
          path: tarpaulin-report.html
          retention-days: 7

  benchs:
    name: Benchmarks
    runs-on: ubuntu-latest
    needs: [tests]
    if: |
      always() && (
        (github.event_name == 'workflow_dispatch' && inputs.job == 'benchmarks') ||
        (github.event_name != 'workflow_dispatch' && github.ref == 'refs/heads/main' && needs.tests.result == 'success')
      )
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
      - run: cargo bench --all-features
